[build]
  publish = "."
  command = "echo 'No build required - static HTML'"

[[redirects]]
  from = "/*"
  to = "/measurement-demo.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer-when-downgrade"
